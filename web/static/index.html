<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>pgwt</title>
<link rel="stylesheet" href="style.css">
<!-- ECharts vendored at an exact version (web/static/vendor/echarts.min.js):
     deterministic builds, airgapped-safe, stable visual snapshots, no
     supply-chain exposure from a floating CDN tag. ApexCharts was removed in
     B3 (the AAS chart moved to ECharts with a custom selection overlay). -->
<script src="vendor/echarts.min.js"></script>
</head>
<body>

<header>
  <div class="header-left">
    <h1>pgwt</h1>
    <span id="status" class="status connecting">Connecting...</span>
    <!-- Version-skew banner (T7 / TST-11): shown when the client build and the
         remote pgwt-server report different versions/protocol. Warn, never
         refuse — a skewed pair is the normal deployment state. -->
    <span id="version-skew" class="version-skew" style="display:none"
          title=""></span>
  </div>
  <div class="header-right">
    <!-- Escalate control (B5): visible only when the daemon supports tiered
         escalation; wired through pgwt-server's control proxy. -->
    <span id="escalate-control" class="escalate-control" style="display:none"></span>
    <button id="metrics-btn" class="metrics-btn" title="Daemon self-metrics" style="display:none">⚙</button>
    <button id="zoom-out-btn" class="zoom-out-btn" title="Zoom out">&#x2296;</button>
    <span id="time-range" class="time-range-btn"></span>
    <button id="live-btn" class="live-btn" title="Auto-refresh (5s)">Live</button>
    <div id="time-picker" class="time-picker" style="display:none">
      <div class="tp-section">
        <div class="tp-label">Quick ranges</div>
        <div class="tp-quick">
          <button data-range="300">5m</button>
          <button data-range="900" class="active">15m</button>
          <button data-range="1800">30m</button>
          <button data-range="3600">1h</button>
          <button data-range="10800">3h</button>
          <button data-range="21600">6h</button>
          <button data-range="43200">12h</button>
          <button data-range="86400">24h</button>
          <button data-range="0">All</button>
        </div>
      </div>
      <div class="tp-section">
        <div class="tp-label">Custom range (UTC)</div>
        <!-- These inputs are UTC (like every displayed time in pgwt) and are
             parsed as UTC — see datetimeLocalUTCToNs in lib/format.js. -->
        <div class="tp-custom">
          <label>From (UTC) <input type="datetime-local" id="tp-from" step="1"></label>
          <label>To (UTC) <input type="datetime-local" id="tp-to" step="1"></label>
          <button id="tp-apply" class="tp-apply">Apply</button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Daemon self-metrics panel (B5): toggled by #metrics-btn. -->
<div id="daemon-metrics" class="daemon-metrics" style="display:none"></div>

<div id="aas-chart-container" style="padding:0 20px;background:#1e1e3a"></div>
<div id="chart-resize"></div>

<nav id="tabs">
  <button class="tab active" data-tab="overview">Overview</button>
  <button class="tab" data-tab="events">Events</button>
  <button class="tab" data-tab="sessions">Sessions</button>
  <button class="tab" data-tab="queries">Queries</button>
  <button class="tab" data-tab="histogram">Histogram</button>
  <button class="tab" data-tab="timeline">Timeline</button>
  <button class="tab" data-tab="transitions">Transitions</button>
  <button class="tab" data-tab="concurrency">Concurrency</button>
</nav>

<div id="breadcrumb"></div>
<div id="summary-bar"></div>
<div id="table-container"></div>
<div id="query-tooltip" class="query-tooltip"></div>

<!-- Degraded-transport overlay (Trust Milestone UI-1): shown when the server
     behind the bridge is unreachable (SSH death, server crash). Distinct from
     any "No data" state — the data panes are covered, not blanked, and the
     header stays interactive (pointer-events:none on the overlay). -->
<div id="degraded-overlay" class="degraded-overlay" style="display:none">
  <div class="degraded-card">
    <div class="degraded-title">⚠ Connection to the server lost</div>
    <div class="degraded-hint">Charts and tables show the last data received —
      they are NOT live. Retrying automatically…</div>
    <div id="degraded-reason" class="degraded-detail"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
