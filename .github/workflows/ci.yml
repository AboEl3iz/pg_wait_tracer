# CI safety net (Phase B1 of docs/REWORK_PLAN.md)
#
# Three jobs:
#   build-and-unit  — full build (BPF tracer + pgwt-server), C unit tests,
#                     Python synthetic-data correctness tests
#   web-ui          — Playwright suite against tests/mock_server.py; any
#                     browser console error fails the test that caused it
#   protocol-drift  — same JSON-line commands against the real pgwt-server
#                     (trace fixture generated in CI, nothing committed) and
#                     against the mock; response schemas must match
name: CI

on:
  push:
    branches: [master]
  pull_request:
  # Manual trigger used to (re)generate the B4 visual-snapshot baselines IN CI
  # — the only environment whose chromium/font rendering matches the gating
  # compare. `update_snapshots: true` runs the snapshot suite with
  # --update-snapshots and uploads the produced PNGs as an artifact (see the
  # `snapshots` job). Download, commit under tests/web_snapshots/, push.
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate visual-snapshot baselines and upload them as an artifact"
        type: boolean
        default: false

jobs:
  build-and-unit:
    name: build-and-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev \
            zlib1g-dev liblz4-dev linux-tools-common
          # bpftool: the runner's HWE azure kernel ships linux-tools without
          # a bpftool binary (only the dispatch wrapper), so a packaged
          # bpftool may not exist. Use it if it works; otherwise build a
          # pinned bpftool from source (~30s, needs only libelf/zlib).
          if bpftool version >/dev/null 2>&1; then
            BPFTOOL=$(command -v bpftool)
          else
            git clone --depth 1 --branch v7.5.0 --recurse-submodules \
              https://github.com/libbpf/bpftool.git /tmp/bpftool
            make -C /tmp/bpftool/src -j"$(nproc)"
            BPFTOOL=/tmp/bpftool/src/bpftool
          fi
          "$BPFTOOL" version
          echo "BPFTOOL=$BPFTOOL" >> "$GITHUB_ENV"
          # The BPF build generates vmlinux.h from the running kernel's BTF
          test -r /sys/kernel/btf/vmlinux

      - name: Build (BPF tracer + pgwt-server)
        run: make

      - name: Build C unit tests
        run: make -C tests

      - name: Run C unit tests
        # The test list lives in tests/unit_tests.list — the single source of
        # truth shared with tests/run_all.sh (TST-3: the two hand-maintained
        # lists had drifted; test_event_writer/test_event_reader were missing
        # from run_all and test_concurrent_rw ran nowhere).
        run: make -C tests check

      - name: Run synthetic data tests
        run: |
          set -e
          for t in tests/test_data_*.py; do
            echo "=== $t ==="
            python3 "$t"
          done
          python3 tests/test_current_trace.py

      - name: Run web UI builder unit tests (Node, no browser — Phase B3)
        # Pure builders (data -> ECharts option / table model) and the state /
        # transport / selection modules are Node-testable without a browser.
        # A builder off-by-one fails here in milliseconds, no Playwright needed.
        run: node --test 'tests/web_unit/*.test.mjs'

  capture-smoke:
    # Phase T0 (Trust Milestone, TST-1/2): run the REAL capture path against
    # a real PostgreSQL on the runner. Every field escape to date (#8, #24,
    # #30, #31) lived in the capture/discovery slice that the other jobs
    # never execute; this job's entire purpose is to go red when capture
    # silently records nothing.
    #
    # Watchpoints (perf hardware breakpoints) may be unavailable on hosted
    # runners' hypervisor — tests/ci_smoke.sh probes for them empirically:
    # if present, --mode full is asserted as hard as tiered; if absent, the
    # full-mode section is skipped LOUDLY in the job summary while the
    # tiered/sampled assertions (the shipped default) remain the hard gate.
    name: capture-smoke (PG ${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [13, 16, 17, 18]
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev \
            zlib1g-dev liblz4-dev linux-tools-common
          # Same bpftool fallback as build-and-unit: the runner's HWE azure
          # kernel may ship linux-tools without a bpftool binary.
          if bpftool version >/dev/null 2>&1; then
            BPFTOOL=$(command -v bpftool)
          else
            git clone --depth 1 --branch v7.5.0 --recurse-submodules \
              https://github.com/libbpf/bpftool.git /tmp/bpftool
            make -C /tmp/bpftool/src -j"$(nproc)"
            BPFTOOL=/tmp/bpftool/src/bpftool
          fi
          "$BPFTOOL" version
          echo "BPFTOOL=$BPFTOOL" >> "$GITHUB_ENV"
          test -r /sys/kernel/btf/vmlinux

      - name: Install PostgreSQL ${{ matrix.pg }} (PGDG apt)
        run: |
          set -x
          V=${{ matrix.pg }}
          # Stop and drop any preinstalled clusters so ours owns port 5432.
          sudo systemctl stop postgresql || true
          sudo apt-get install -y postgresql-common
          pg_lsclusters -h | awk '{print $1, $2}' | while read -r ver name; do
            sudo pg_dropcluster --stop "$ver" "$name" || true
          done
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          # PG13 is EOL: when the live PGDG repo no longer carries it, fall
          # back to the PGDG apt archive (same signing key).
          if ! apt-cache show "postgresql-$V" >/dev/null 2>&1; then
            echo "postgresql-$V not in the live PGDG repo — adding apt-archive"
            echo "deb https://apt-archive.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
              | sudo tee /etc/apt/sources.list.d/pgdg-archive.list
            sudo apt-get update
          fi
          sudo apt-get install -y "postgresql-$V" "postgresql-contrib-$V"

      - name: Configure + start PostgreSQL ${{ matrix.pg }}
        run: |
          set -ex
          V=${{ matrix.pg }}
          # The postgresql-$V package auto-creates cluster "main" unless one
          # already existed (e.g. the preinstalled PG16 we dropped above).
          if ! pg_lsclusters -h | awk -v v="$V" '$1 == v && $2 == "main"' | grep -q .; then
            sudo pg_createcluster "$V" main
          fi
          sudo pg_conftool "$V" main set port 5432
          # pg_stat_statements everywhere:
          #  - PG13: REQUIRED for query attribution (no in-core query_id;
          #    the tracer walks PlannedStmt.queryId that pgss populates).
          #  - PG14+: compute_query_id=on so st_query_id is populated.
          sudo pg_conftool "$V" main set shared_preload_libraries pg_stat_statements
          if [ "$V" -ge 14 ]; then
            sudo pg_conftool "$V" main set compute_query_id on
          fi
          # Tests connect as "psql -U postgres" from root: trust local auth.
          sudo sed -i -E 's/(peer|scram-sha-256|md5)$/trust/' \
            "/etc/postgresql/$V/main/pg_hba.conf"
          sudo pg_ctlcluster "$V" main start
          psql -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements"
          psql -U postgres -d postgres -tAc "SELECT version()"

      - name: Build (BPF tracer + pgwt-server)
        run: make

      - name: Run capture smoke (tiered hard; full if watchpoints available)
        run: |
          V=${{ matrix.pg }}
          sudo env "PATH=/usr/lib/postgresql/$V/bin:$PATH" \
            tests/ci_smoke.sh --pg-version "$V"

  web-ui:
    name: web-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + websockets
        run: |
          python3 -m pip install playwright websockets
          python3 -m playwright install --with-deps chromium

      - name: Run web UI tests (mock server)
        run: python3 tests/test_web_ui.py

      - name: Run web UI chaos tests (adversarial mock — Phase B2)
        # Drives the UI against mock_server.py in chaos mode (latency jitter,
        # out-of-order + late responses). Race-exposing tests are classified
        # gating vs xfail inside the suite, so this stays green; an xfail that
        # starts passing is reported (XPASS) for promotion, never fatal.
        run: python3 tests/test_web_ui_chaos.py

  protocol-drift:
    name: protocol-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (server only, no BPF)
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev liblz4-dev

      - name: Build pgwt-server + trace generator
        run: |
          make pgwt-server
          make -C tests gen_test_traces

      - name: Run protocol drift test (real server vs mock)
        run: python3 tests/test_protocol_drift.py

  snapshots:
    # Visual-regression snapshots (Phase B4). Catches the "renders without
    # errors but looks wrong" class (dropped series color, layout breakage)
    # that DOM/getOption() assertions miss. GATING on PR/push.
    #
    # Determinism: Playwright screenshots are environment-sensitive, so the
    # committed baselines (tests/web_snapshots/*.png) are generated by THIS
    # SAME job (ubuntu-latest + the chromium pinned by `playwright install`)
    # via the workflow_dispatch `update_snapshots` input — never locally. The
    # Playwright context pins viewport/device-scale/reduced-motion/animations;
    # the mock dataset has a fixed time base. A small pixel-diff tolerance
    # absorbs antialiasing.
    name: snapshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Pillow + numpy + websockets
        run: |
          python3 -m pip install playwright websockets pillow numpy
          python3 -m playwright install --with-deps chromium

      - name: Print chromium revision (for baseline provenance)
        run: python3 -m playwright --version

      # COMPARE mode (PR/push, or a manual run without the input): gating.
      - name: Compare visual snapshots against baselines
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.update_snapshots }}
        env:
          CI: "1"
        run: python3 tests/test_web_ui_snapshots.py

      # On a compare failure, upload actual + diff PNGs so a regression (or a
      # legitimate baseline update) can be reviewed.
      - name: Upload snapshot diffs on failure
        if: ${{ failure() && (github.event_name != 'workflow_dispatch' || !inputs.update_snapshots) }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs
          path: |
            tests/web_snapshots/*-actual.png
            tests/web_snapshots/*-diff.png
          if-no-files-found: ignore

      # UPDATE mode (manual workflow_dispatch with update_snapshots=true):
      # regenerate baselines and upload them; not gating.
      - name: Generate baselines (--update-snapshots)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
        env:
          CI: "1"
        run: python3 tests/test_web_ui_snapshots.py --update-snapshots

      - name: Upload generated baselines
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-baselines
          path: tests/web_snapshots/*.png
